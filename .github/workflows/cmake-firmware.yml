name: CMake Firmware

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch: # This adds the "Run workflow" button manually

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # Upgraded from v2/v3
      with:
        submodules: recursive # Ensures the Joybus libraries are included

    - name: Install ARM Toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi build-essential cmake

    - name: Configure and Build
      run: |
        mkdir build
        cd build
        cmake ..
        make -j$(nproc)

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4 # This fixes your error
      with:
        name: pico-rectangle-guitar-firmware
        path: build/*.uf2 # This grabs the finished file
