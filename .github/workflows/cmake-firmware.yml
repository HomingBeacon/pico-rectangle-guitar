name: CMake Firmware

on:
  push:
    branches: [ master, main ]
  pull_request:
  workflow_dispatch: # This gives you a manual "Run" button

jobs:
  build-firmware:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive # CRITICAL: Gets the Joybus/Guitar libraries

    - name: Checkout pico sdk
      uses: actions/checkout@v4
      with:
        repository: raspberrypi/pico-sdk
        path: pico-sdk
        submodules: true # Gets the SDK's own dependencies

    - name: Install Toolchain
      run: |
        sudo apt update
        sudo apt install -y cmake gcc-arm-none-eabi libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib build-essential

    - name: Configure and Build
      env:
        PICO_SDK_PATH: ${{ github.workspace }}/pico-sdk
      run: |
        mkdir build
        cd build
        cmake ..
        make -j$(nproc)

    - name: Upload Standard Firmware
      uses: actions/upload-artifact@v4
      with:
        name: pico_rectangle_standard
        path: build/pico_rectangle.uf2

    - name: Upload Ult 2IP SOCD
      uses: actions/upload-artifact@v4
      with:
        name: pico_rectangle_ult_2ip
        path: build/pico_rectangle_ULT_2IP_WITH_REAC.uf2
        if-no-files-found: warn # Use warn so it doesn't crash if this specific version didn't build

    - name: Upload Ult Neutral SOCD
      uses: actions/upload-artifact@v4
      with:
        name: pico_rectangle_ult_neutral
        path: build/pico_rectangle_ULT_NEUTRAL.uf2
        if-no-files-found: warn
