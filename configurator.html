<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SG Guitar Configurator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; }
.header { background: #16213e; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #0f3460; }
.header h1 { font-size: 20px; color: #e94560; }
.btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.2s; }
.btn-primary { background: #e94560; color: white; }
.btn-primary:hover { background: #d63851; }
.btn-secondary { background: #0f3460; color: #e0e0e0; }
.btn-secondary:hover { background: #1a4a8a; }
.btn-danger { background: #c0392b; color: white; }
.btn-danger:hover { background: #a93226; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.main { display: flex; gap: 24px; padding: 24px; flex-wrap: wrap; }
.panel { background: #16213e; border-radius: 12px; padding: 20px; border: 1px solid #0f3460; }
.panel h2 { font-size: 16px; color: #e94560; margin-bottom: 16px; }
.guitar-panel { flex: 1; min-width: 400px; }
.config-panel { width: 340px; }
.status { padding: 6px 12px; border-radius: 12px; font-size: 13px; font-weight: 600; }
.status-disconnected { background: #c0392b33; color: #e74c3c; }
.status-connected { background: #27ae6033; color: #2ecc71; }

/* Guitar SVG layout */
.guitar-visual { position: relative; width: 100%; }
svg.guitar { width: 100%; height: auto; }
.fret { cursor: pointer; transition: all 0.15s; }
.fret:hover { filter: brightness(1.3); }
.fret.active { filter: brightness(1.6); stroke: white; stroke-width: 3; }
.fret-label { font-size: 11px; fill: white; text-anchor: middle; pointer-events: none; font-weight: bold; }
.bind-label { font-size: 10px; fill: #aaa; text-anchor: middle; pointer-events: none; }

/* Whammy bar */
.whammy-container { margin-top: 16px; }
.whammy-bar { width: 100%; height: 28px; background: #0a0a1a; border-radius: 14px; overflow: hidden; position: relative; border: 1px solid #333; }
.whammy-fill { height: 100%; background: linear-gradient(90deg, #0f3460, #e94560); border-radius: 14px; transition: width 0.05s; }
.whammy-value { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 13px; font-weight: bold; }
.cal-values { display: flex; gap: 12px; margin-top: 8px; font-size: 13px; color: #888; }
.cal-values span { background: #0a0a1a; padding: 4px 10px; border-radius: 6px; }

/* Bind editor */
.bind-list { display: flex; flex-direction: column; gap: 8px; }
.bind-row { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: #0a0a1a; border-radius: 8px; border: 1px solid transparent; transition: border-color 0.2s; }
.bind-row.highlight { border-color: #e94560; }
.bind-pin { font-size: 12px; color: #888; min-width: 50px; }
.bind-name { font-size: 13px; font-weight: 600; min-width: 90px; }
.bind-select { flex: 1; background: #16213e; color: #e0e0e0; border: 1px solid #333; border-radius: 4px; padding: 4px 8px; font-size: 13px; }
.bind-indicator { width: 8px; height: 8px; border-radius: 50%; background: #333; transition: background 0.1s; }
.bind-indicator.pressed { background: #2ecc71; }

/* Actions */
.actions { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }

/* Whammy calibration */
.cal-section { margin-top: 16px; padding-top: 16px; border-top: 1px solid #0f3460; }
.cal-inputs { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
.cal-input { width: 70px; background: #0a0a1a; color: #e0e0e0; border: 1px solid #333; border-radius: 4px; padding: 6px 8px; font-size: 13px; text-align: center; }
.cal-auto { margin-top: 8px; font-size: 12px; color: #888; }
.cal-auto em { color: #e94560; }
</style>
</head>
<body>

<div class="header">
    <h1>SG Guitar Configurator</h1>
    <div style="display: flex; align-items: center; gap: 12px;">
        <span id="statusBadge" class="status status-disconnected">Disconnected</span>
        <button id="connectBtn" class="btn btn-primary" onclick="toggleConnection()">Connect</button>
    </div>
</div>

<div class="main">
    <div class="panel guitar-panel">
        <h2>Guitar Layout</h2>
        <div class="guitar-visual">
            <svg class="guitar" viewBox="0 0 520 280" xmlns="http://www.w3.org/2000/svg">
                <!-- Neck background -->
                <rect x="10" y="40" width="360" height="200" rx="12" fill="#222" stroke="#444" stroke-width="1"/>
                <!-- Fret markers -->
                <line x1="80" y1="40" x2="80" y2="240" stroke="#555" stroke-width="1"/>
                <line x1="150" y1="40" x2="150" y2="240" stroke="#555" stroke-width="1"/>
                <line x1="220" y1="40" x2="220" y2="240" stroke="#555" stroke-width="1"/>
                <line x1="290" y1="40" x2="290" y2="240" stroke="#555" stroke-width="1"/>

                <!-- Fret buttons -->
                <rect class="fret" id="fret-0" data-slot="0" x="20" y="90" width="50" height="100" rx="8" fill="#27ae60"/>
                <text class="fret-label" x="45" y="135">Green</text>
                <text class="bind-label" id="fret-0-bind" x="45" y="155">A</text>

                <rect class="fret" id="fret-1" data-slot="1" x="90" y="90" width="50" height="100" rx="8" fill="#e74c3c"/>
                <text class="fret-label" x="115" y="135">Red</text>
                <text class="bind-label" id="fret-1-bind" x="115" y="155">Up</text>

                <rect class="fret" id="fret-2" data-slot="2" x="160" y="90" width="50" height="100" rx="8" fill="#f1c40f"/>
                <text class="fret-label" x="185" y="135">Yellow</text>
                <text class="bind-label" id="fret-2-bind" x="185" y="155">Down</text>

                <rect class="fret" id="fret-3" data-slot="3" x="230" y="90" width="50" height="100" rx="8" fill="#3498db"/>
                <text class="fret-label" x="255" y="135">Blue</text>
                <text class="bind-label" id="fret-3-bind" x="255" y="155">B</text>

                <rect class="fret" id="fret-4" data-slot="4" x="300" y="90" width="50" height="100" rx="8" fill="#e67e22"/>
                <text class="fret-label" x="325" y="135">Orange</text>
                <text class="bind-label" id="fret-4-bind" x="325" y="155">L</text>

                <!-- Strum bar -->
                <rect x="390" y="60" width="120" height="50" rx="6" fill="#555" stroke="#777" stroke-width="1"/>
                <rect class="fret" id="fret-5" data-slot="5" x="395" y="65" width="110" height="18" rx="4" fill="#888"/>
                <text class="fret-label" x="450" y="78" font-size="10">Up Strum</text>

                <rect class="fret" id="fret-6" data-slot="6" x="395" y="87" width="110" height="18" rx="4" fill="#888"/>
                <text class="fret-label" x="450" y="100" font-size="10">Down Strum</text>

                <!-- Whammy area -->
                <rect x="390" y="130" width="120" height="40" rx="8" fill="#333" stroke="#555" stroke-width="1"/>
                <text class="fret-label" x="450" y="154" font-size="10">Whammy</text>
                <rect class="fret" id="fret-7" data-slot="7" x="395" y="175" width="50" height="24" rx="4" fill="#666"/>
                <text class="fret-label" x="420" y="191" font-size="9">R btn</text>

                <!-- Tilt -->
                <rect class="fret" id="fret-8" data-slot="8" x="460" y="175" width="50" height="24" rx="4" fill="#9b59b6"/>
                <text class="fret-label" x="485" y="191" font-size="9">Tilt</text>

                <!-- Select / Start -->
                <circle class="fret" id="fret-9" data-slot="9" cx="415" cy="235" r="14" fill="#555"/>
                <text class="fret-label" x="415" y="239" font-size="8">Select</text>

                <circle class="fret" id="fret-10" data-slot="10" cx="475" cy="235" r="14" fill="#555"/>
                <text class="fret-label" x="475" y="239" font-size="8">Start</text>
            </svg>
        </div>

        <div class="whammy-container">
            <h2>Whammy Bar</h2>
            <div class="whammy-bar">
                <div class="whammy-fill" id="whammyFill" style="width: 0%"></div>
                <span class="whammy-value" id="whammyValue">0</span>
            </div>
            <div class="cal-values">
                <span>Cal: <span id="calStatus">N/A</span></span>
                <span>High: <span id="calHigh">255</span></span>
                <span>Low: <span id="calLow">0</span></span>
            </div>
        </div>
    </div>

    <div class="panel config-panel">
        <h2>Button Bindings</h2>
        <div class="bind-list" id="bindList"></div>

        <div class="actions">
            <button class="btn btn-primary" onclick="saveBinds()" id="saveBindsBtn" disabled>Save Binds</button>
            <button class="btn btn-danger" onclick="resetBinds()" id="resetBindsBtn" disabled>Reset Defaults</button>
        </div>

        <div class="cal-section">
            <h2>Whammy Calibration</h2>
            <p style="font-size: 12px; color: #888; margin-bottom: 8px;">Set high/low values manually or use live capture.</p>
            <div class="cal-inputs">
                <label style="font-size: 13px;">High:</label>
                <input type="number" class="cal-input" id="calHighInput" min="0" max="255" value="255">
                <label style="font-size: 13px;">Low:</label>
                <input type="number" class="cal-input" id="calLowInput" min="0" max="255" value="0">
            </div>
            <div class="cal-inputs" style="margin-top: 8px;">
                <button class="btn btn-secondary" onclick="captureWhammyHigh()" id="capHighBtn" disabled>Capture High</button>
                <button class="btn btn-secondary" onclick="captureWhammyLow()" id="capLowBtn" disabled>Capture Low</button>
            </div>
            <div class="actions" style="margin-top: 8px;">
                <button class="btn btn-primary" onclick="saveWhammyCal()" id="saveCalBtn" disabled>Save Calibration</button>
                <button class="btn btn-danger" onclick="resetWhammyCal()" id="resetCalBtn" disabled>Reset Cal</button>
            </div>
            <div class="cal-auto">
                <em>Tip:</em> Press "Capture High" with whammy fully pressed, "Capture Low" with whammy at rest.
            </div>
        </div>
    </div>
</div>

<script>
// Protocol constants
const CMD_SET_WHAMMY_CAL   = 0x01;
const CMD_SET_BIND         = 0x02;
const CMD_SAVE_BINDS       = 0x03;
const CMD_RESET_BINDS      = 0x04;
const CMD_RESET_WHAMMY_CAL = 0x05;

const REPORT_SIZE = 32;

const BUTTON_NAMES = [
    'A', 'B', 'X', 'Y', 'Z',
    'L', 'R', 'LS', 'MS',
    'MX', 'MY', 'Start',
    'Left', 'Right', 'Up', 'Down',
    'C-Left', 'C-Right', 'C-Up', 'C-Down'
];

const SLOT_NAMES = [
    'Green Fret', 'Red Fret', 'Yellow Fret', 'Blue Fret', 'Orange Fret',
    'Up Strum', 'Down Strum', 'R Button', 'Tilt',
    'Select', 'Start'
];

const NUM_SLOTS = 11;

let device = null;
let connected = false;
let liveWhammy = 0;
let currentBinds = new Array(NUM_SLOTS).fill(0);
let currentPins = new Array(NUM_SLOTS).fill(0);

// Initialize bind list UI
function initBindList() {
    const list = document.getElementById('bindList');
    list.innerHTML = '';
    for (let i = 0; i < NUM_SLOTS; i++) {
        const row = document.createElement('div');
        row.className = 'bind-row';
        row.id = `bind-row-${i}`;

        let options = '';
        for (let j = 0; j < BUTTON_NAMES.length; j++) {
            options += `<option value="${j}">${BUTTON_NAMES[j]}</option>`;
        }

        row.innerHTML = `
            <div class="bind-indicator" id="bind-ind-${i}"></div>
            <div class="bind-name">${SLOT_NAMES[i]}</div>
            <div class="bind-pin" id="bind-pin-${i}">GP?</div>
            <select class="bind-select" id="bind-sel-${i}" onchange="onBindChange(${i}, this.value)" disabled>
                ${options}
            </select>
        `;
        list.appendChild(row);
    }
}

function onBindChange(slot, value) {
    if (!connected || !device) return;
    const data = new Uint8Array(REPORT_SIZE);
    data[0] = CMD_SET_BIND;
    data[1] = slot;
    data[2] = parseInt(value);
    device.sendReport(0, data);
}

async function toggleConnection() {
    if (connected) {
        await disconnect();
    } else {
        await connect();
    }
}

async function connect() {
    try {
        const devices = await navigator.hid.requestDevice({
            filters: [{ vendorId: 0x2E8A, productId: 0x1080 }]
        });
        if (devices.length === 0) return;

        device = devices[0];
        await device.open();

        device.addEventListener('inputreport', handleInputReport);

        connected = true;
        updateUI();
    } catch (e) {
        console.error('Connection failed:', e);
        alert('Connection failed: ' + e.message);
    }
}

async function disconnect() {
    if (device) {
        try { await device.close(); } catch (e) {}
        device = null;
    }
    connected = false;
    updateUI();
}

function handleInputReport(event) {
    const data = new Uint8Array(event.data.buffer);
    if (data.length < 30) return;

    // Byte 0: report type (0x01 = status)
    if (data[0] !== 0x01) return;

    // Byte 1: live whammy
    liveWhammy = data[1];

    // Byte 2: cal configured
    const calConfigured = data[2] === 1;
    // Byte 3: cal high, Byte 4: cal low
    const calHigh = data[3];
    const calLow = data[4];

    // Bytes 5-26: binds (11 x 2 bytes: pin, buttonIndex)
    for (let i = 0; i < NUM_SLOTS; i++) {
        currentPins[i] = data[5 + i * 2];
        currentBinds[i] = data[5 + i * 2 + 1];
    }

    // Bytes 27-29: button state
    const state0 = data[27];
    const state1 = data[28];
    const state2 = data[29];

    // Button pressed states (matches the bit layout in firmware)
    const pressed = [
        !!(state0 & 0x01), // a
        !!(state0 & 0x02), // b
        !!(state0 & 0x04), // x
        !!(state0 & 0x08), // y
        !!(state0 & 0x10), // z
        !!(state0 & 0x20), // l
        !!(state0 & 0x40), // r
        !!(state0 & 0x80), // ls
        !!(state1 & 0x01), // ms
        !!(state1 & 0x02), // mx
        !!(state1 & 0x04), // my
        !!(state1 & 0x08), // start
        !!(state1 & 0x10), // left
        !!(state1 & 0x20), // right
        !!(state1 & 0x40), // up
        !!(state1 & 0x80), // down
        !!(state2 & 0x01), // cLeft
        !!(state2 & 0x02), // cRight
        !!(state2 & 0x04), // cUp
        !!(state2 & 0x08), // cDown
    ];

    // Update whammy display
    const pct = Math.round(liveWhammy / 255 * 100);
    document.getElementById('whammyFill').style.width = pct + '%';
    document.getElementById('whammyValue').textContent = liveWhammy;

    // Update calibration display
    document.getElementById('calStatus').textContent = calConfigured ? 'Yes' : 'No';
    document.getElementById('calHigh').textContent = calHigh;
    document.getElementById('calLow').textContent = calLow;

    // Update bind list
    for (let i = 0; i < NUM_SLOTS; i++) {
        const sel = document.getElementById(`bind-sel-${i}`);
        if (sel && sel.value != currentBinds[i]) {
            sel.value = currentBinds[i];
        }
        const pin = document.getElementById(`bind-pin-${i}`);
        if (pin) pin.textContent = 'GP' + currentPins[i];

        // Update bind label on guitar SVG
        const bindLabel = document.getElementById(`fret-${i}-bind`);
        if (bindLabel) {
            bindLabel.textContent = BUTTON_NAMES[currentBinds[i]] || '?';
        }
    }

    // Update fret active states and bind indicators
    for (let i = 0; i < NUM_SLOTS; i++) {
        const bi = currentBinds[i];
        const isPressed = pressed[bi];

        const fret = document.getElementById(`fret-${i}`);
        if (fret) {
            if (isPressed) fret.classList.add('active');
            else fret.classList.remove('active');
        }

        const ind = document.getElementById(`bind-ind-${i}`);
        if (ind) {
            if (isPressed) ind.classList.add('pressed');
            else ind.classList.remove('pressed');
        }

        const row = document.getElementById(`bind-row-${i}`);
        if (row) {
            if (isPressed) row.classList.add('highlight');
            else row.classList.remove('highlight');
        }
    }
}

async function saveBinds() {
    if (!connected || !device) return;
    const data = new Uint8Array(REPORT_SIZE);
    data[0] = CMD_SAVE_BINDS;
    await device.sendReport(0, data);
}

async function resetBinds() {
    if (!connected || !device) return;
    if (!confirm('Reset all bindings to factory defaults?')) return;
    const data = new Uint8Array(REPORT_SIZE);
    data[0] = CMD_RESET_BINDS;
    await device.sendReport(0, data);
}

function captureWhammyHigh() {
    document.getElementById('calHighInput').value = liveWhammy;
}

function captureWhammyLow() {
    document.getElementById('calLowInput').value = liveWhammy;
}

async function saveWhammyCal() {
    if (!connected || !device) return;
    const high = parseInt(document.getElementById('calHighInput').value) || 0;
    const low = parseInt(document.getElementById('calLowInput').value) || 0;
    const data = new Uint8Array(REPORT_SIZE);
    data[0] = CMD_SET_WHAMMY_CAL;
    data[1] = Math.min(255, Math.max(0, high));
    data[2] = Math.min(255, Math.max(0, low));
    await device.sendReport(0, data);
}

async function resetWhammyCal() {
    if (!connected || !device) return;
    if (!confirm('Reset whammy calibration to defaults?')) return;
    const data = new Uint8Array(REPORT_SIZE);
    data[0] = CMD_RESET_WHAMMY_CAL;
    await device.sendReport(0, data);
}

function updateUI() {
    const badge = document.getElementById('statusBadge');
    const btn = document.getElementById('connectBtn');

    if (connected) {
        badge.textContent = 'Connected';
        badge.className = 'status status-connected';
        btn.textContent = 'Disconnect';
    } else {
        badge.textContent = 'Disconnected';
        badge.className = 'status status-disconnected';
        btn.textContent = 'Connect';
    }

    // Enable/disable controls
    const controls = ['saveBindsBtn', 'resetBindsBtn', 'capHighBtn', 'capLowBtn', 'saveCalBtn', 'resetCalBtn'];
    controls.forEach(id => {
        document.getElementById(id).disabled = !connected;
    });
    for (let i = 0; i < NUM_SLOTS; i++) {
        const sel = document.getElementById(`bind-sel-${i}`);
        if (sel) sel.disabled = !connected;
    }
}

// Init
initBindList();
updateUI();

// Handle device disconnect
if (navigator.hid) {
    navigator.hid.addEventListener('disconnect', (event) => {
        if (device && event.device === device) {
            device = null;
            connected = false;
            updateUI();
        }
    });
}
</script>
</body>
</html>
